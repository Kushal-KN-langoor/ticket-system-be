services:
  - type: web
    name: ticketing-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false